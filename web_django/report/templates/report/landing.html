<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Savestock 股利報表</title>
  <style>
    body { margin: 0; background: #F3F5F9; color: #1C1C1E;
           font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif; }
    .box { max-width: 560px; margin: 12vh auto; background: #fff; border-radius: 16px;
           padding: 36px 32px; box-shadow: 0 4px 14px rgba(32,44,68,.08); text-align: center; }
    h1 { font-size: 22px; margin: 0 0 12px; }
    p { color: #6C757D; font-size: 14px; line-height: 1.7; }
    .pill { display: inline-block; background: rgba(26,115,232,.12); color: #1A73E8;
            font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <span class="pill">Savestock</span>
    <h1>年度股利報表服務</h1>
    <p>
      此頁面提供 Savestock「股利試算」的可分享、可列印報表。<br>
      請在 Savestock App 輸入持股後，點「產生網頁報表」開啟你的專屬報表連結。
    </p>
  </div>
</body>
</html>
